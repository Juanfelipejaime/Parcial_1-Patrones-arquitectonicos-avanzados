backend:
  replicaCount: 1
  image:
    repository: kennethreitz/httpbin
    tag: latest
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

frontend:
  replicaCount: 1
  image:
    repository: nginx
    tag: latest
  resources:
    requests:
      cpu: "25m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"
  apiPath: "/api/get"

postgresql:
  auth:
    username: petclinic
    password: petclinicpass
    database: petclinic
  primary:
    persistence:
      enabled: true
      size: 1Gi

ingress:
  mode: host
  host: dev.parcial1.local