apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-frontend-html
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <meta charset="utf-8" />
      <title>Frontend Test</title>
    </head>
    <body>
      <h1>Frontend funcionando</h1>
      <button onclick="callApi()">Probar Backend</button>
      <pre id="result"></pre>

      <script>
        function callApi() {
          fetch("{{ .Values.frontend.apiPath }}")
            .then(r => r.json())
            .then(data => {
              document.getElementById("result").textContent =
                JSON.stringify(data, null, 2);
            })
            .catch(err => {
              document.getElementById("result").textContent = err.toString();
            });
        }
      </script>
    </body>
    </html>