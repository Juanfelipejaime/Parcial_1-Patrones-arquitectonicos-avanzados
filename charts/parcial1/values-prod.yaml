backend:
  replicaCount: 1
  image:
    repository: kennethreitz/httpbin
    tag: latest
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "300m"
      memory: "256Mi"

frontend:
  replicaCount: 1
  image:
    repository: nginx
    tag: latest
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

postgresql:
  auth:
    username: petclinic
    password: petclinicpass
    database: petclinic
  primary:
    persistence:
      enabled: true
      size: 2Gi